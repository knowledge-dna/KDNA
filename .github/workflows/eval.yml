name: KDNA Eval

on:
  push:
    branches: [main]
    paths: ['examples/**', 'src/**', 'validators/**', 'schema/**']
  pull_request:
    branches: [main]
    paths: ['examples/**', 'src/**', 'validators/**', 'schema/**']

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install

      - name: Lint examples
        run: npm run lint:examples

      - name: Validate schemas
        run: npm run validate:examples

      - name: Run unit tests
        run: npm test

      - name: Verify installed domains
        run: |
          npm install -g .
          kdna install writing
          kdna verify @aikdna/writing
          kdna available
