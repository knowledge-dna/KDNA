name: KDNA Eval

on:
  push:
    branches: [main]
    paths: ['.github/workflows/eval.yml', 'conformance/**', 'examples/**', 'packages/**', 'schema/**', 'scripts/**']
  pull_request:
    branches: [main]
    paths: ['.github/workflows/eval.yml', 'conformance/**', 'examples/**', 'packages/**', 'schema/**', 'scripts/**']

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22' }

      - run: npm ci

      - name: Run deterministic protocol preflight
        run: npm run release:preflight
