name: KDNA Eval

on:
  push:
    branches: [main]
    paths: ['examples/**', 'src/**', 'validators/**', 'schema/**']
  pull_request:
    branches: [main]
    paths: ['examples/**', 'src/**', 'validators/**', 'schema/**']

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install

      - name: Lint examples
        run: npm run lint:examples

      - name: Validate schemas
        run: npm run validate:examples

      - name: Run unit tests
        run: npm test

      - name: kdna eval — sales
        run: node src/cli.js eval examples/sales

      - name: kdna eval — management
        run: node src/cli.js eval examples/management

      - name: kdna eval — silver_age
        run: node src/cli.js eval examples/silver_age
