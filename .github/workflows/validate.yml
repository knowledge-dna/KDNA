name: Validate KDNA Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx eslint packages/kdna-core/src/
      - run: npm run format:check
      - run: npm run lint:examples

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run validate:examples

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Validate runtime contract examples
        run: npm run validate:runtime-contract
      - name: Validate judgment-trace schema examples
        run: |
          npx ajv validate -s schema/judgment-trace.schema.json -d examples/app-runtime-contract/kdnachat-trace.json --errors=text
          npx ajv validate -s schema/judgment-trace.schema.json -d examples/app-runtime-contract/kdnawork-trace.json --errors=text
      - name: Validate feedback-event schema examples
        run: |
          npx ajv validate -s schema/feedback-event.schema.json -d examples/app-runtime-contract/kdnachat-feedback.json --errors=text
          npx ajv validate -s schema/feedback-event.schema.json -d examples/app-runtime-contract/kdnawork-feedback.json --errors=text
