name: Registry Validate

on:
  pull_request:
    paths: ['registry/domains.json']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install

      - name: Validate registry JSON
        run: |
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('registry/domains.json', 'utf8'));
          const domains = Array.isArray(data) ? data : data.domains;
          if (!domains || !domains.length) { console.error('No domains'); process.exit(1); }
          const ids = new Set();
          for (const d of domains) {
            if (!d.id) { console.error('Missing id'); process.exit(1); }
            if (ids.has(d.id)) { console.error('Duplicate id: ' + d.id); process.exit(1); }
            ids.add(d.id);
            if (!d.repo) { console.error(d.id + ': missing repo'); process.exit(1); }
            if (!d.status) { console.error(d.id + ': missing status'); process.exit(1); }
            if (!['experimental','basic','stable','pro'].includes(d.status)) {
              console.error(d.id + ': invalid status: ' + d.status);
              process.exit(1);
            }
          }
          console.log('Registry valid: ' + domains.length + ' domains, all IDs unique');
          "

      - name: Check spec_version consistency
        run: |
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('registry/domains.json', 'utf8'));
          const domains = Array.isArray(data) ? data : data.domains;
          for (const d of domains) {
            if (d.spec_version && d.spec_version !== '0.2') {
              console.warn(d.id + ': spec_version ' + d.spec_version + ' may need update');
            }
          }
          console.log('spec_version check complete');
          "
